<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis de Calidad - Carga de Imagen</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            height: auto;
            background-color: #0e3d26; 
            overflow-y: auto; 
        }

        /* Sección Superior: Previsualización de la imagen cargada */
        #image-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0e3d26; 
            position: relative;
            padding: 30px 20px;
            min-height: 55vh;
        }

        #image-preview {
            max-height: 50vh; 
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            display: none; 
            border: 3px solid #446351;
        }

        /* Controles de carga */
        #controls-container {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .custom-file-upload {
            padding: 16px 35px;
            font-size: 1.1rem;
            background-color: #0d5c36; 
            color: white;
            border: 2px solid #1b7a4b;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: background-color 0.2s, transform 0.2s;
            letter-spacing: 1px;
        }

        .custom-file-upload:hover {
            background-color: #11693e;
            transform: scale(1.03);
        }

        #image-input {
            display: none;
        }

        #loading-model-msg {
            color: white;
            font-size: 1.3rem;
            position: absolute;
            font-weight: bold;
            background-color: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 8px;
        }

        /* Sección Inferior: Panel Semáforo (Resultado) */
        #result-section {
            height: 35vh;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #446351; 
            color: white;
            transition: background-color 0.3s ease;
            box-shadow: 0 -8px 25px rgba(0,0,0,0.4);
            z-index: 10;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        #status-text {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        @media (max-width: 600px) {
            #status-text { font-size: 1.8rem; }
        }

        #percentage-text {
            font-size: 1.4rem;
            margin-top: 10px;
            opacity: 0.95;
            font-weight: 600;
            background-color: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <!-- Zona de Carga -->
    <div id="image-section">
        <div id="loading-model-msg">Cargando modelo de IA...</div>
        <img id="image-preview" src="#" alt="Previsualización" />

        <div id="controls-container" style="display: none;">
            <input type="file" id="image-input" accept="image/*" onchange="readURL(this);" />
            <label for="image-input" class="custom-file-upload">
                📷 SELECCIONAR IMAGEN
            </label>
        </div>
    </div>

    <!-- Panel Semáforo -->
    <div id="result-section">
        <p id="status-text">ESPERANDO IMAGEN</p>
        <div id="percentage-text">Cargue una foto para analizar el estándar</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/FRvbyoDob/";

        let model, maxPredictions;
        const imagePreview = document.getElementById('image-preview');
        const loadingMsg = document.getElementById('loading-model-msg');
        const controlsCont = document.getElementById('controls-container');

        async function initModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                loadingMsg.style.display = 'none';
                controlsCont.style.display = 'flex';
            } catch (error) {
                console.error(error);
                loadingMsg.innerText = "Error cargando el modelo. Revisa la consola.";
                loadingMsg.style.color = "#dc3545";
            }
        }

        function readURL(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    setTimeout(predict, 100); 
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function predict() {
            if (!model) return;

            document.getElementById("status-text").innerText = "ANALIZANDO...";
            document.getElementById("result-section").style.backgroundColor = "#446351";

            const prediction = await model.predict(imagePreview);
            
            let claseGanadora = prediction[0];
            for (let i = 1; i < maxPredictions; i++) {
                if (prediction[i].probability > claseGanadora.probability) {
                    claseGanadora = prediction[i];
                }
            }

            const nombreClase = claseGanadora.className.toLowerCase().trim();
            const porcentaje = (claseGanadora.probability * 100).toFixed(0);

            const panelSemafoto = document.getElementById("result-section");
            const textoEstatus = document.getElementById("status-text");
            const textoPorcentaje = document.getElementById("percentage-text");

            textoPorcentaje.innerText = `Confianza del análisis: ${porcentaje}%`;

            // --- CORRECCIÓN DE DETECCIÓN ULTRA-SEGURA ---
            if (nombreClase.includes("crit") || nombreClase.includes("crít")) {
                panelSemafoto.style.backgroundColor = "#dc3545"; // Rojo estricto
                textoEstatus.innerText = "🚨 RECHAZO: DESVIACIÓN CRÍTICA 🚨";
            } 
            else if (nombreClase.includes("mayor")) {
                panelSemafoto.style.backgroundColor = "#556b2f"; // Verde Oliva
                textoEstatus.innerText = "⚠️ ALERTA: DESVIACIÓN MAYOR ⚠️";
            } 
            else if (nombreClase.includes("menor")) {
                panelSemafoto.style.backgroundColor = "#2e7d32"; // Verde Intermedio
                textoEstatus.innerText = "🔍 DETALLE: DESVIACIÓN MENOR";
            } 
            else if (nombreClase.includes("sin") || nombreClase.includes("cumple") || nombreClase.includes("bueno") || nombreClase.includes("ok")) {
                panelSemafoto.style.backgroundColor = "#218838"; // Verde Aprobado
                textoEstatus.innerText = "✅ OK: SIN DESVIACIÓN";
            } 
            else {
                // COLOR DE DIAGNÓSTICO: Si el nombre en TM tiene caracteres extraños, 
                // se pondrá gris para avisarnos que no entró en ninguna regla anterior.
                panelSemafoto.style.backgroundColor = "#5a6268"; 
                textoEstatus.innerText = claseGanadora.className.toUpperCase();
            }
        }

        window.onload = initModel;
    </script>
</body>
</html>
