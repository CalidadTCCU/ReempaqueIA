<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis de Calidad - Carga de Imagen</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        /* Sección Superior: Previsualización de la imagen cargada */
        #image-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            position: relative;
            padding: 20px;
        }

        #image-preview {
            max-height: 70vh;
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none; /* Oculto hasta que se cargue una imagen */
        }

        /* Controles de carga flotantes */
        #controls-container {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        /* Estilo para el botón visual de carga */
        .custom-file-upload {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background-color 0.2s, transform 0.2s;
        }

        .custom-file-upload:hover {
            background-color: #0056b3;
            transform: scale(1.02);
        }

        /* Ocultar el input file real que es feo */
        #image-input {
            display: none;
        }

        #loading-model-msg {
            color: white;
            font-size: 1.2rem;
            position: absolute;
        }

        /* Sección Inferior: Panel Semáforo (Resultado) */
        #result-section {
            height: 30vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #333;
            color: white;
            transition: background-color 0.3s ease;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 10;
            padding: 10px;
            text-align: center;
        }

        #status-text {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            #status-text { font-size: 1.8rem; }
        }

        #percentage-text {
            font-size: 1.2rem;
            margin-top: 5px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="image-section">
        <div id="loading-model-msg">Cargando modelo de IA...</div>
        
        <img id="image-preview" src="#" alt="Previsualización" />

        <div id="controls-container" style="display: none;">
            <input type="file" id="image-input" accept="image/*" onchange="readURL(this);" />
            <label for="image-input" class="custom-file-upload">
                📷 SELECCIONAR IMAGEN
            </label>
        </div>
    </div>

    <div id="result-section">
        <p id="status-text">ESPERANDO IMAGEN</p>
        <div id="percentage-text">Cargue una foto para analizar</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // Tu modelo enlazado
        const URL = "https://teachablemachine.withgoogle.com/models/FRvbyoDob/";

        let model, maxPredictions;
        const imagePreview = document.getElementById('image-preview');
        const loadingMsg = document.getElementById('loading-model-msg');
        const controlsCont = document.getElementById('controls-container');

        // 1. Cargar el modelo al abrir la página automáticamente
        async function initModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                
                // Ocultar mensaje de carga y mostrar botones
                loadingMsg.style.display = 'none';
                controlsCont.style.display = 'flex';
            } catch (error) {
                console.error(error);
                loadingMsg.innerText = "Error cargando el modelo. Revisa la consola.";
                loadingMsg.style.color = "red";
            }
        }

        // 2. Función para leer el archivo seleccionado y mostrarlo en pantalla
        function readURL(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();

                reader.onload = function (e) {
                    // Establecer la imagen cargada como fuente de la previsualización
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    
                    // Esperar un momento a que la imagen se renderice y luego predecir
                    setTimeout(predict, 100); 
                };

                reader.readAsDataURL(input.files[0]);
            }
        }

        // 3. Procesa la imagen estática cargada
        async function predict() {
            if (!model) return;

            document.getElementById("status-text").innerText = "ANALIZANDO...";
            document.getElementById("result-section").style.backgroundColor = "#333";

            // Teachable Machine puede predecir directamente desde un elemento <img>
            const prediction = await model.predict(imagePreview);
            
            // Encontrar la categoría más probable
            let claseGanadora = prediction[0];
            for (let i = 1; i < maxPredictions; i++) {
                if (prediction[i].probability > claseGanadora.probability) {
                    claseGanadora = prediction[i];
                }
            }

            const nombreClase = claseGanadora.className.toLowerCase();
            const porcentaje = (claseGanadora.probability * 100).toFixed(0);

            // Actualizar la interfaz (Misma lógica de semáforo)
            const panelSemafoto = document.getElementById("result-section");
            const textoEstatus = document.getElementById("status-text");
            const textoPorcentaje = document.getElementById("percentage-text");

            textoPorcentaje.innerText = `Confianza del análisis: ${porcentaje}%`;

            if (nombreClase.includes("critico") || nombreClase.includes("crítico")) {
                panelSemafoto.style.backgroundColor = "#dc3545"; // Rojo
                textoEstatus.innerText = "🚨 RECHAZO: CRÍTICO 🚨";
            } 
            else if (nombreClase.includes("mayor")) {
                panelSemafoto.style.backgroundColor = "#ff9800"; // Naranja
                textoEstatus.innerText = "⚠️ ALERTA: MAYOR";
            } 
            else if (nombreClase.includes("menor")) {
                panelSemafoto.style.backgroundColor = "#17a2b8"; // Celeste
                textoEstatus.innerText = "🔍 DETALLE: MENOR";
            } 
            else if (nombreClase.includes("sin defecto") || nombreClase.includes("cumple") || nombreClase.includes("bueno")) {
                panelSemafoto.style.backgroundColor = "#28a745"; // Verde
                textoEstatus.innerText = "✅ PIEZA OK";
            } 
            else {
                panelSemafoto.style.backgroundColor = "#6c757d"; 
                textoEstatus.innerText = claseGanadora.className.toUpperCase();
            }
        }

        // Iniciar carga del modelo al cargar la ventana
        window.onload = initModel;

    </script>
</body>
</html>
